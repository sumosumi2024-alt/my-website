<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BeautyOS v3.1 Pro</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold2:#a87d30;--gold3:#8B6914;
  --dark:#0F0F0F;--cream:#FAF7F2;--border:#E8E0D5;
  --ok:#16a34a;--warn:#d97706;--err:#dc2626;--ind:#4f46e5;
  --font:'Segoe UI','Helvetica Neue',Arial,sans-serif;
  --sidebar-w:232px;
}
body{font-family:var(--font);background:#F2EFE9;min-height:100vh}
button{cursor:pointer;font-family:var(--font)}
input,select{font-family:var(--font)}
/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}

/* ── LAYOUT ── */
#app{display:flex;min-height:100vh}
#sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,#0F0F0F,#1a1208);display:flex;flex-direction:column;transition:width .2s;flex-shrink:0;position:relative;z-index:100;border-right:1px solid rgba(201,168,76,0.12)}
#sidebar.collapsed{width:62px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 26px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
#content{flex:1;overflow:auto;padding:24px 28px}

/* Sidebar parts */
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:10}
#sidebar.collapsed .sb-logo{padding:18px 11px}
.sb-logo-icon{width:38px;height:38px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,var(--gold),var(--gold3));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:20px;box-shadow:0 2px 10px rgba(201,168,76,.55)}
.sb-logo-text{color:var(--gold);font-weight:900;font-size:16px;letter-spacing:1.5px;font-family:Georgia,serif}
.sb-logo-ver{color:#555;font-size:8px;letter-spacing:1px}
.sb-spa{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px}
.sb-spa-label{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.sb-spa-name{color:#ccc;font-weight:700}
#sidebar nav{flex:1;padding:10px 7px;overflow-y:auto}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:10px 12px;border-radius:9px;border:none;background:transparent;color:#555;margin-bottom:2px;text-align:left;font-size:13px;font-weight:400;transition:all .12s;border-left:3px solid transparent;white-space:nowrap;overflow:hidden}
.nav-btn.active{background:rgba(201,168,76,0.18);color:var(--gold);font-weight:700;border-left-color:var(--gold)}
.nav-btn:hover:not(.active){background:rgba(255,255,255,0.04);color:#888}
#sidebar.collapsed .nav-btn{padding:11px;justify-content:center}
.sb-user{padding:10px 7px;border-top:1px solid rgba(255,255,255,0.05)}
.sb-user-card{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:9px;background:rgba(255,255,255,0.04);margin-bottom:5px}
#sidebar.collapsed .sb-user-card{padding:9px;justify-content:center}
.sb-user-avatar{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0}
.sb-user-name{color:#ddd;font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-user-role{color:#555;font-size:9px;text-transform:uppercase;letter-spacing:.5px}
.sb-logout{display:flex;align-items:center;gap:7px;width:100%;padding:7px 12px;border-radius:9px;border:none;background:transparent;color:#555;font-size:12px}
.sb-logout:hover{color:#888}
#sidebar.collapsed .sb-logout{padding:8px;justify-content:center}
.sb-toggle{position:absolute;top:22px;right:-11px;width:22px;height:22px;border-radius:50%;border:1px solid rgba(201,168,76,.55);background:#1a1208;color:var(--gold);font-size:11px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.4)}

/* ── CARDS ── */
.card{background:#fff;border-radius:14px;border:1px solid var(--border);box-shadow:0 1px 8px rgba(0,0,0,.06);padding:20px 24px}
.kpi-card{display:flex;align-items:center;gap:14px;padding:16px 18px}
.kpi-icon{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.kpi-label{font-size:10px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.kpi-value{font-size:21px;font-weight:900;color:var(--dark);margin-top:2px}
.kpi-sub{font-size:11px;margin-top:3px;display:flex;gap:5px}

/* ── BADGES ── */
.bdg{border-radius:6px;padding:2px 9px;font-size:11px;font-weight:700;white-space:nowrap;display:inline-block}

/* ── BUTTONS ── */
.btn{border-radius:8px;font-weight:700;font-size:13px;padding:9px 20px;border:none;transition:opacity .15s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;box-shadow:0 2px 8px rgba(201,168,76,.4)}
.btn-ghost{background:transparent;color:var(--gold);border:1.5px solid rgba(201,168,76,.6)}
.btn-secondary{background:#f5f2ed;color:#444;border:1px solid var(--border)}
.btn-danger{background:var(--err);color:#fff}
.btn-success{background:var(--ok);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-full{width:100%}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:linear-gradient(135deg,#faf7f0,#f5f0e8);border-bottom:2px solid rgba(201,168,76,.33)}
th{padding:10px 14px;text-align:left;font-size:10px;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:.8px;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:#faf8f4}
td{padding:11px 14px}
tbody tr.danger:hover{background:#fff5f5}

/* ── FORM ── */
.form-label{display:block;font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.form-input{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:9px 13px;font-size:14px;background:var(--cream);outline:none;box-sizing:border-box;font-family:var(--font)}
.form-input:focus{border-color:var(--gold)}
.form-group{margin-bottom:14px}
.form-hint{font-size:11px;color:#aaa;margin-top:4px}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 12px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#fff;border-radius:18px;width:100%;max-height:92vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.modal-title{font-size:15px;font-weight:700;color:var(--dark)}
.modal-close{border:none;background:none;font-size:22px;color:#aaa;line-height:1}
.modal-body{padding:24px}

/* ── GRID KPI ── */
.grid-kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px}

/* ── MISC ── */
.page-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.page-title h2{font-size:21px;font-weight:900;color:var(--dark)}
.page-sub{color:#888;font-size:13px;margin-bottom:16px}
.empty-state{text-align:center;padding:48px;color:#bbb}
.empty-state .empty-icon{font-size:38px;margin-bottom:10px}
.empty-state p{font-size:13px}
code.inv{font-size:11px;background:#f0ece4;padding:2px 8px;border-radius:5px;font-family:monospace}
.overflow-x{overflow-x:auto}

/* ── LOGIN ── */
#login-screen{min-height:100vh;display:flex;flex-direction:column;background:linear-gradient(160deg,#0a0a0a 0%,#1c1408 45%,#0a0a0a 100%);position:relative;overflow:hidden}
.login-glow1{position:fixed;top:-10%;right:-10%;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.13) 0%,transparent 65%);pointer-events:none}
.login-glow2{position:fixed;bottom:-8%;left:-8%;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(79,70,229,.08) 0%,transparent 65%);pointer-events:none}
.login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1}
.login-panel{width:900px;max-width:100%;display:flex;border-radius:24px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.6)}
.login-left{flex:1;background:rgba(255,255,255,.03);border-right:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px}
.login-left-icon{width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,var(--gold),var(--gold3));display:flex;align-items:center;justify-content:center;font-size:36px;color:#fff;font-weight:900;margin-bottom:20px;box-shadow:0 8px 40px rgba(201,168,76,.4)}
.login-left h1{color:var(--gold);font-size:34px;font-weight:900;letter-spacing:3px;font-family:Georgia,serif;text-align:center;margin-bottom:8px}
.login-left p{color:#555;font-size:13px;text-align:center;line-height:1.7;margin-bottom:36px}
.login-feature{background:rgba(255,255,255,.04);border-radius:12px;padding:12px 16px;border:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:12px;width:100%;max-width:280px;margin-bottom:8px}
.login-feature-icon{font-size:20px;flex-shrink:0}
.login-feature-title{color:var(--gold);font-size:11px;font-weight:700}
.login-feature-sub{color:#444;font-size:10px;margin-top:1px}
.login-right{width:400px;background:rgba(255,255,255,.04);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.08);padding:48px 40px;display:flex;flex-direction:column;justify-content:center}
.login-right h2{color:#fff;font-size:22px;font-weight:800;margin-bottom:4px}
.login-right > p{color:#555;font-size:12px;margin-bottom:28px}
.login-field-label{display:block;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.login-input{width:100%;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 16px;font-size:15px;color:#fff;outline:none;box-sizing:border-box;font-family:var(--font)}
.login-input:focus{border-color:rgba(201,168,76,.5)}
.login-input::placeholder{color:#444}
.login-pw-wrap{position:relative}
.login-pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);border:none;background:transparent;color:#666;font-size:16px;padding:4px}
.login-err{background:rgba(220,38,38,.18);border:1px solid rgba(220,38,38,.4);border-radius:10px;padding:12px 16px;margin-bottom:18px;font-size:13px;color:#fca5a5;display:flex;align-items:center;gap:8px}
.login-btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:800;letter-spacing:.5px;font-family:var(--font);box-shadow:0 4px 24px rgba(201,168,76,.55);transition:all .2s}
.login-btn:disabled{background:rgba(255,255,255,.1);color:#666;box-shadow:none}
.login-footer{margin-top:20px;padding-top:20px;border-top:1px solid rgba(255,255,255,.06);text-align:center}
.login-footer p{color:#444;font-size:11px;margin-bottom:4px}
.login-footer .support{color:var(--gold);font-size:12px;font-weight:600}
.login-copy{color:#2a2a2a;font-size:10px;text-align:center;margin-top:12px;letter-spacing:.3px}

/* ── SPA ICON ── */
.spa-icon{border-radius:28%;flex-shrink:0;background:linear-gradient(135deg,var(--gold),var(--gold3));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;box-shadow:0 2px 10px rgba(201,168,76,.55)}
.spa-icon-sm{width:32px;height:32px;font-size:14px;border-radius:9px}
.spa-icon-md{width:42px;height:42px;font-size:18px;border-radius:12px}
.spa-icon-lg{width:60px;height:60px;font-size:26px;border-radius:17px}

/* Alert / info boxes */
.info-box{border-radius:9px;padding:12px 16px;margin-bottom:12px;font-size:12px}
.info-green{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534}
.info-yellow{background:#fef9eb;border:1px solid #fcd34d;color:#92400e;font-size:13px}
.info-red{background:#fef2f2;border:1px solid #fca5a5;color:var(--err)}

/* Filter pills */
.pill-group{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.pill{padding:6px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:700;border:1.5px solid var(--border);background:transparent;color:#666;transition:all .12s}
.pill.active{border-color:var(--gold);background:rgba(201,168,76,.18);color:var(--gold)}

/* Charts container */
.chart-wrap{position:relative;height:150px}

/* Low stock warning */
.low-stock-bar{background:#fef9eb;border:1px solid #fcd34d;border-radius:11px;padding:10px 16px;margin-bottom:14px;font-size:13px;color:#92400e;display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* Staff cards */
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.staff-card{padding:16px 18px}
.staff-avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900}

/* Responsive */
@media(max-width:600px){
  .login-left{display:none}
  .login-right{width:100%;border-radius:20px;padding:28px 24px 40px}
  .login-panel{border-radius:0;box-shadow:none}
  .login-glow1{width:240px;height:240px}
  #content{padding:16px}
  .form-grid2,.form-grid3{grid-template-columns:1fr}
}
</style>
</head>

function getTier(c){
  const days=Math.floor((new Date()-new Date(c.lastVisit||c.date))/864e5);
  if(days>60)return{l:"Nguy cơ mất",c:ER};
  if(c.spent>=10000000)return{l:"VIP",c:G};
  if(c.spent>=3000000)return{l:"Thân thiết",c:IN};
  return{l:"Mới",c:OK};
}
function bdg(label,color,sz=11){
  return `<span class="bdg" style="background:${color}22;color:${color};border:1px solid ${color}44;font-size:${sz}px">${label}</span>`;
}
function btn(label,cls,onclick,disabled=false,id=""){
  return `<button class="btn ${cls}" ${onclick?`onclick="${onclick}"`:""}${disabled?' disabled':""} ${id?`id="${id}"`:""}>${label}</button>`;
}
function spaIcon(letter,size="md"){
  return `<div class="spa-icon spa-icon-${size}">${letter||"B"}</div>`;
}
function kpiCard(icon,label,value,color,trend,sub){
  const trendHtml=trend!==undefined?`<span style="color:${trend>0?OK:ER};font-weight:700">${trend>0?"▲":"▼"}${Math.abs(trend)}%</span>`:"";
  const subHtml=sub?`<span style="color:#aaa">${sub}</span>`:"";
  return `<div class="card kpi-card">
    <div class="kpi-icon" style="background:${color}18">${icon}</div>
    <div style="flex:1">
      <div class="kpi-label">${label}</div>
      <div class="kpi-value">${value}</div>
      <div class="kpi-sub">${trendHtml}${subHtml}</div>
    </div>
  </div>`;
}
function thRow(cols){
  return `<thead><tr>${cols.map(c=>`<th>${c}</th>`).join("")}</tr></thead>`;
}
function modalHtml(id,title,body,width=520){
  return `<div class="modal-overlay" id="modal-${id}" onclick="closeModal('${id}')">
    <div class="modal-box" style="max-width:${width}px" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span class="modal-title">${title}</span>
        <button class="modal-close" onclick="closeModal('${id}')">×</button>
      </div>
      <div class="modal-body">${body}</div>
    </div>
  </div>`;
}
function inpField(label,id,type="text",value="",placeholder="",hint="",req=false){
  return `<div class="form-group">
    ${label?`<label class="form-label" for="${id}">${label}${req?'<span style="color:var(--err)"> *</span>':""}</label>`:""}
    <input class="form-input" type="${type}" id="${id}" value="${esc(value)}" placeholder="${esc(placeholder)}"/>
    ${hint?`<div class="form-hint">${hint}</div>`:""}
  </div>`;
}
function selField(label,id,options,value=""){
  return `<div class="form-group">
    ${label?`<label class="form-label">${label}</label>`:""}
    <select class="form-input" id="${id}">
      ${options.map(o=>`<option value="${esc(o.v)}"${o.v==value?" selected":""}>${esc(o.l)}</option>`).join("")}
    </select>
  </div>`;
}
function esc(s){return String(s||"").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function showModal(id,title,body,width=520){
  const existing=document.getElementById(`modal-${id}`);
  if(existing)existing.remove();
  const div=document.createElement("div");
  div.innerHTML=modalHtml(id,title,body,width);
  document.body.appendChild(div.firstElementChild);
}
function closeModal(id){
  const el=document.getElementById(`modal-${id}`);
  if(el)el.remove();
}

  const inp=document.getElementById("login-pass");

  const show=inp.type==="password";

}
function doLogin(){
  const email=(document.getElementById("login-email")||{}).value||"";
  const pass=(document.getElementById("login-pass")||{}).value||"";
  const errEl=document.getElementById("login-err");
  const errMsg=document.getElementById("login-err-msg");
  const submitBtn=document.getElementById("login-submit");
  if(!email||!pass){errMsg.textContent="Vui lòng nhập đầy đủ thông tin.";errEl.style.display="flex";return;}
  submitBtn.disabled=true;submitBtn.textContent="Đang xác thực...";
  setTimeout(()=>{
    const u=STATE.allUsers.find(x=>x.email===email&&x.pass===pass&&x.active);
    if(u){
      STATE.user=u;
      STATE.page=u.role==="platform_owner"?"platform_dash":"spa_dash";
      renderApp();
    } else {
      errMsg.textContent="Tên đăng nhập hoặc mật khẩu không chính xác.";
      errEl.style.display="flex";
      submitBtn.disabled=false;submitBtn.textContent="Đăng nhập →";
    }
  },600);
}

function posCalc(){
  const sub=POS.items.reduce((s,it)=>s+it.price*it.qty,0);
  const disc=Number(POS.disc)||0;
  const total=Math.max(0,sub-disc);
  const paid=Number(POS.paid)||0;
  const debt=Math.max(0,total-paid);
  return{sub,disc,total,paid,debt};
}
function posRenderItems(){
  const wrap=document.getElementById("pos-items-wrap");
  if(!wrap)return;
  if(!POS.items.length){wrap.innerHTML="";return;}
  wrap.innerHTML=`<div class="card" style="padding:0;overflow:hidden">
    ${POS.items.map((it,i)=>`
    <div style="display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid #E8E0D5;gap:10px">
      <span style="flex:1;font-weight:600;font-size:13px">${it.name}</span>
      <div style="display:flex;align-items:center;gap:6px">
        <button onclick="posQty(${i},-1)" style="width:24px;height:24px;border-radius:50%;border:1px solid #E8E0D5;background:#fff;cursor:pointer;font-weight:700">−</button>
        <span style="width:20px;text-align:center;font-weight:700">${it.qty}</span>
        <button onclick="posQty(${i},1)" style="width:24px;height:24px;border-radius:50%;border:1px solid ${G};background:${G}15;cursor:pointer;color:${G};font-weight:700">+</button>
      </div>
      <span style="width:85px;text-align:right;color:${G};font-weight:700;font-size:13px">${fmt(it.price*it.qty)}</span>
      <button onclick="posRemove(${i})" style="border:none;background:none;color:${ER};cursor:pointer;font-size:18px">×</button>
    </div>`).join("")}
  </div>`;
}
function posRenderSummary(){
  const{sub,disc,total,paid,debt}=posCalc();
  const rows=[["Tạm tính",fmt(sub),"#333"],["Giảm giá","- "+fmt(disc),"#888"],["Thực thu",fmt(total),"#333"],["Đã trả",fmt(paid),OK]];
  const s=document.getElementById("pos-summary");
  const w=document.getElementById("pos-debt-warn");
  if(s)s.innerHTML=`<div style="background:#FAF7F2;border-radius:10px;padding:14px;margin-bottom:14px;border:1px solid #E8E0D5">
    ${rows.map(r=>`<div style="display:flex;justify-content:space-between;margin-bottom:5px">

      <span style="font-weight:${r[0]==="Thực thu"?900:700};font-size:${r[0]==="Thực thu"?15:13}px;color:${r[2]}">${r[1]}</span>
    </div>`).join("")}
    ${debt>0?`<div style="display:flex;justify-content:space-between;padding-top:5px;margin-top:5px;border-top:1px dashed #E8E0D5">
      <span style="font-size:13px;color:${ER}">Công nợ</span><span style="font-weight:700;color:${ER}">${fmt(debt)}</span>
    </div>`:""}
  </div>`;
  if(w)w.innerHTML=debt>0?`<div class="info-box info-yellow" style="margin-bottom:12px">⚠️ Sẽ tạo công nợ ${fmt(debt)} cho khách hàng</div>`:"";
  // update paid field label
  const pf=document.getElementById("pos-paid-field");
  if(pf)pf.innerHTML=inpField(`Khách trả — Tổng: ${fmt(total)}`,"pos-paid","number",POS.paid);
  document.getElementById("pos-paid")?.addEventListener("input",e=>{POS.paid=e.target.value;posRenderSummary();});
  // update discount
  document.getElementById("pos-disc")?.addEventListener("input",e=>{POS.disc=Number(e.target.value)||0;posRenderSummary();});
}

function posAddSvc(id){
  const sv=STATE.services.find(x=>x.id===id);if(!sv)return;
  const ex=POS.items.find(i=>i.id===id&&i.t==="sv");
  if(ex)POS.items=POS.items.map(i=>i.id===id&&i.t==="sv"?{...i,qty:i.qty+1}:i);
  else POS.items.push({id:sv.id,t:"sv",name:sv.name,price:sv.price,qty:1});
  posRenderItems();posRenderSummary();
}
window.posAddSvc=posAddSvc;

function posAddProd(id){
  const pr=STATE.products.find(x=>x.id===id);if(!pr||pr.stock===0)return;
  const ex=POS.items.find(i=>i.id===id&&i.t==="p");
  if(ex)POS.items=POS.items.map(i=>i.id===id&&i.t==="p"?{...i,qty:i.qty+1}:i);
  else POS.items.push({id:pr.id,t:"p",name:pr.name+" 🛍",price:pr.sellPrice,qty:1});
  posRenderItems();posRenderSummary();
}
window.posAddProd=posAddProd;

function posQty(i,delta){
  POS.items=POS.items.map((it,j)=>j===i?{...it,qty:Math.max(1,it.qty+delta)}:it);
  posRenderItems();posRenderSummary();
}
window.posQty=posQty;

function posRemove(i){
  POS.items=POS.items.filter((_,j)=>j!==i);

}
window.posRemove=posRemove;

}

          <div style="font-weight:700;margin-top:4px">${pm.price>0?fmt(pm.price)+"/tháng":"Miễn phí"}</div>
          <div style="font-size:12px;color:#aaa;margin-top:4px">Hết hạn: ${spa&&spa.planExpiry}</div>
        </div>
        ${btn("Nâng cấp gói","btn btn-ghost btn-sm","")}`:""} 
      </div>
      <div class="card">
        <b style="font-size:14px;display:block;margin-bottom:10px">Bảo mật</b>
        ${inpField("Mật khẩu mới","set-pw","password")}
        ${btn("Đổi mật khẩu","btn btn-ghost btn-sm","")}
      </div>
    </div>
  </div>`;
}
function saveSpaSettings(){
  const spaId=STATE.user.spaId;
  const name=document.getElementById("set-name")?.value||"";
  const addr=document.getElementById("set-addr")?.value||"";
  const phone=document.getElementById("set-phone")?.value||"";
  STATE.spas=STATE.spas.map(s=>s.id===spaId?{...s,name,address:addr,phone}:s);
  const msg=document.getElementById("set-msg");
  if(msg){msg.innerHTML=`<div style="color:${OK};font-weight:700;margin-bottom:8px;font-size:13px">✅ Đã lưu thành công!</div>`;
    setTimeout(()=>{if(msg)msg.innerHTML="";},2500);}
}
window.saveSpaSettings=saveSpaSettings;

// ══════════════════════════════════════════════════════════════
// ROUTER + RENDER
// ══════════════════════════════════════════════════════════════
function getPageHtml(){
  const{page}=STATE;
  if(page==="platform_dash")return pagePlatformDash();
  if(page==="manage_spas")  return pageManageSpas();
  if(page==="manage_users") return pageManageUsers();
  if(page==="subscriptions")return pageSubscriptions();
  if(page==="spa_dash")     return pageSpaDash();
  if(page==="pos")          return pagePOS();
  if(page==="customers")    return pageCustomers();
  if(page==="services")     return pageServices();
  if(page==="products")     return pageProducts();
  if(page==="invoices")     return pageInvoices();
  if(page==="debts")        return pageDebts();
  if(page==="staff")        return pageStaff();
  if(page==="spa_settings") return pageSpaSettings();
  return pageSpaDash();
}

function renderApp(){
  const appEl=document.getElementById("app");
  if(!appEl)return;
  if(!STATE.user){
    appEl.outerHTML=renderLogin();
    // Re-bind since outerHTML replaces the element
    const app2=document.createElement("div");
    app2.id="app";
    document.body.appendChild(app2);
    document.getElementById("app").outerHTML=renderLogin();
    return;
  }
  const pageHtml=getPageHtml();
  document.getElementById("app").outerHTML=`<div id="app">${renderShell(pageHtml)}</div>`;
  // Post-render hooks
  if(STATE.page==="spa_dash"){
    requestAnimationFrame(()=>setTimeout(initDashCharts,50));
  }
  if(STATE.page==="pos"){
    requestAnimationFrame(()=>{
      posRenderItems();
      posRenderSummary();
      document.getElementById("pos-paid")?.addEventListener("input",e=>{POS.paid=e.target.value;posRenderSummary();});
      document.getElementById("pos-disc")?.addEventListener("input",e=>{POS.disc=Number(e.target.value)||0;posRenderSummary();});
      document.getElementById("pos-cust")?.addEventListener("change",e=>{POS.custId=e.target.value;});
    });
  }
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
(function init(){
  const appEl=document.getElementById("app");
  appEl.innerHTML=renderLogin();
  // bind login listeners - handled by inline onclick
})();
</script>
